<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>關於高僑｜高僑資優文教機構</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#9e2b2b;--red-deep:#6f1d20;--red-bright:#c0392f;--red-soft:#efe0db;
  --paper:#fbf8f3;--cream:#f4eee4;--ink:#241d1b;--muted:#8a7d77;
  --line:rgba(36,29,27,.12);--hair:rgba(36,29,27,.08);
  --serif:'Noto Serif TC',serif;--sans:'Noto Sans TC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:2;font-weight:300;-webkit-font-smoothing:antialiased;overflow-x:hidden;letter-spacing:.2px}
.wrap{max-width:1140px;margin:0 auto;padding:0 40px}

/* NAV */
header.nav{position:sticky;top:0;z-index:100;background:rgba(251,248,243,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--hair)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:78px}
.brand{font-family:var(--serif);font-weight:700;font-size:22px;color:var(--red);letter-spacing:3px}
.brand span{color:var(--ink);font-weight:400}
.menu{display:flex;gap:34px;list-style:none}
.menu a{text-decoration:none;color:var(--ink);font-size:14.5px;font-weight:400;position:relative;padding:6px 0;transition:color .25s;letter-spacing:1.5px}
.menu a:hover{color:var(--red)}
.menu a.active{color:var(--red)}
.menu a.active::after{content:"";position:absolute;left:0;bottom:0;width:100%;height:1px;background:var(--red)}
.nav-cta{border:1px solid var(--red);color:var(--red);text-decoration:none;font-size:13.5px;padding:10px 22px;font-weight:400;transition:.3s;letter-spacing:1.5px}
.nav-cta:hover{background:var(--red);color:#fff}
.burger{display:none}

/* sub anchor nav */
.subnav{background:var(--cream);border-bottom:1px solid var(--hair);position:sticky;top:78px;z-index:90}
.subnav ul{list-style:none;display:flex;justify-content:center;gap:0;flex-wrap:wrap}
.subnav a{display:block;padding:16px 26px;text-decoration:none;color:var(--muted);font-size:14px;letter-spacing:2px;transition:.3s;position:relative}
.subnav a:hover{color:var(--red)}
.subnav a span{font-family:var(--serif);color:var(--red);font-size:12px;margin-right:8px;opacity:.7}

/* eyebrow label */
.lab{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.lab.center{justify-content:center}
.lab .en{font-family:var(--sans);font-weight:500;font-size:12px;letter-spacing:5px;color:var(--red)}
.lab .ln{width:40px;height:1px;background:var(--red)}
.title{font-family:var(--serif);font-weight:600;font-size:clamp(28px,3.6vw,42px);color:var(--ink);letter-spacing:3px;line-height:1.5}

/* ====== HERO ====== */
.hero{position:relative;min-height:520px;display:flex;align-items:center;color:#fff;overflow:hidden;background:linear-gradient(120deg,var(--red-deep),var(--red) 75%)}
.hero .orbit-deco{position:absolute;right:-60px;top:50%;transform:translateY(-50%);width:460px;height:460px;opacity:.5}
.hero .orbit-deco svg{width:100%;height:100%}
.hero .orbit-deco .o{fill:none;stroke:rgba(255,225,218,.5);stroke-width:1}
.hero .orbit-deco .c{fill:rgba(255,225,218,.6)}
.hero .vline{position:absolute;left:40px;top:0;bottom:0;width:1px;background:rgba(255,255,255,.18)}
.hero-txt{position:relative;z-index:5;padding-left:30px}
.hero-txt .en{font-family:var(--sans);font-weight:300;font-size:14px;letter-spacing:10px;color:rgba(255,225,218,.85);margin-bottom:20px}
.hero-txt .rule{width:64px;height:1px;background:rgba(255,255,255,.7);margin-bottom:30px}
.hero-txt h1{font-family:var(--serif);font-weight:600;font-size:clamp(48px,7vw,82px);letter-spacing:14px;line-height:1.2}
.hero-txt .sub{margin-top:30px;font-size:15.5px;letter-spacing:2px;color:rgba(255,255,255,.82);max-width:430px;font-weight:300;line-height:2.1}

/* ====== 1. 品牌起源 ====== */
.origin{position:relative;padding:140px 0 0}
.origin-grid{display:grid;grid-template-columns:1fr .82fr;gap:90px;align-items:center}
.origin-txt .title{margin-bottom:30px}
.origin-txt .hl{font-family:var(--serif);font-size:21px;color:var(--red);font-weight:500;line-height:1.9;margin:8px 0 30px;padding-left:24px;border-left:1px solid var(--red)}
.origin-txt p{color:#5a4f4a;font-size:16.5px;margin-bottom:22px;font-weight:300}
.origin-fig{position:relative}
.origin-fig .ph{aspect-ratio:4/5;background:linear-gradient(155deg,#b14743,var(--red-deep));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:13px;letter-spacing:2px;text-align:center;position:relative;z-index:2}
.origin-fig .ph b{display:block;font-family:var(--serif);font-size:19px;color:rgba(255,232,226,.75);margin-bottom:8px;font-weight:500}
.origin-fig::before{content:"";position:absolute;right:-22px;bottom:-22px;width:60%;height:60%;border-right:1px solid var(--red);border-bottom:1px solid var(--red);z-index:1}
.origin-fig .num{position:absolute;left:-30px;top:-44px;font-family:var(--serif);font-weight:900;font-size:96px;color:var(--red);opacity:.12;line-height:1;z-index:0}
/* stat strip */
.statstrip{margin-top:120px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.statstrip .row{display:grid;grid-template-columns:repeat(4,1fr)}
.stat{text-align:center;padding:48px 16px;position:relative}
.stat + .stat::before{content:"";position:absolute;left:0;top:24%;height:52%;width:1px;background:var(--line)}
.stat .n{font-family:var(--serif);font-weight:600;font-size:clamp(44px,5vw,60px);color:var(--red);line-height:1}
.stat .n small{font-size:22px;font-weight:400}
.stat .t{margin-top:14px;font-size:14.5px;letter-spacing:2px;color:var(--muted);font-weight:400}

/* ====== 2. 創辦理念 ====== */
.founder{position:relative;padding:140px 0;background:var(--cream)}
.founder-grid{display:grid;grid-template-columns:.8fr 1fr;gap:80px;align-items:center}
.founder-fig{position:relative}
.founder-fig .ph{aspect-ratio:1/1;background:linear-gradient(155deg,#b14743,var(--red-deep));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:12.5px;letter-spacing:2px;text-align:center}
.founder-fig .ph b{display:block;font-family:var(--serif);font-size:18px;color:rgba(255,232,226,.75);margin-bottom:6px;font-weight:500}
.founder-fig::before{content:"";position:absolute;left:-22px;top:-22px;width:55%;height:55%;border-left:1px solid var(--red);border-top:1px solid var(--red)}
.founder-txt .title{margin-bottom:30px}
.founder-txt p{color:#5a4f4a;font-size:16.5px;margin-bottom:22px;font-weight:300}
.founder-txt .quote{font-family:var(--serif);font-weight:500;font-size:clamp(20px,2.4vw,26px);color:var(--red);line-height:1.85;margin:30px 0;position:relative;padding-left:28px}
.founder-txt .quote::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--red)}
.founder-txt .sign{font-size:14px;letter-spacing:1px;color:var(--muted)}
.founder-txt .sign b{font-family:var(--serif);color:var(--ink);font-weight:600;font-size:16px;letter-spacing:2px}

/* ====== 3. 35年歷程 (horizontal sweep) ====== */
.timeline{position:relative;padding:140px 0 120px;overflow:hidden}
.timeline .head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:56px;gap:30px;flex-wrap:wrap}
.timeline .head .htxt .lab{margin-bottom:14px}
.tl-nav{display:flex;gap:12px}
.tl-arrow{width:48px;height:48px;border:1px solid var(--line);background:transparent;color:var(--red);font-size:18px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center}
.tl-arrow:hover{background:var(--red);color:#fff;border-color:var(--red)}
.tl-arrow:disabled{opacity:.3;cursor:default}
.tl-arrow:disabled:hover{background:transparent;color:var(--red);border-color:var(--line)}
.tl-track{display:flex;gap:0;overflow-x:auto;scroll-snap-type:x proximity;scroll-behavior:smooth;padding-bottom:30px;cursor:grab;-ms-overflow-style:none;scrollbar-width:none}
.tl-track::-webkit-scrollbar{display:none}
.tl-track.drag{cursor:grabbing;scroll-behavior:auto}
.tl-card{flex:0 0 300px;scroll-snap-align:start;position:relative;padding:62px 34px 0 0;user-select:none}
.tl-card::before{content:"";position:absolute;left:0;right:0;top:70px;height:1px;background:var(--line)}
.tl-card:first-child::before{left:50%}
.tl-card .yr{font-family:var(--serif);font-weight:600;font-size:30px;color:var(--red);line-height:1;margin-bottom:30px}
.tl-card .node{position:absolute;left:0;top:64px;width:13px;height:13px;border-radius:50%;background:var(--paper);border:1px solid var(--red);z-index:2;transition:.35s}
.tl-card:hover .node{background:var(--red);box-shadow:0 0 0 6px var(--red-soft)}
.tl-card .info{padding-top:36px;transition:.35s}
.tl-card:hover .info{transform:translateY(-4px)}
.tl-card .info h4{font-family:var(--serif);font-weight:600;font-size:19px;color:var(--ink);letter-spacing:1.5px;margin-bottom:8px}
.tl-card .info p{color:#6e615b;font-size:14.5px;font-weight:300;line-height:1.95}
.tl-hint{margin-top:6px;font-size:12px;letter-spacing:3px;color:var(--muted);display:flex;align-items:center;gap:10px}
.tl-hint::before{content:"";width:30px;height:1px;background:var(--red)}

/* ====== 4. 教育信念 ====== */
.belief{position:relative;padding:130px 0;background:var(--cream)}
.belief .head{text-align:center;max-width:680px;margin:0 auto 18px}
.belief .head p{color:#5a4f4a;font-size:16.5px;margin-top:20px;font-weight:300}
.principles{display:grid;grid-template-columns:repeat(4,1fr);gap:0;max-width:760px;margin:54px auto 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.principle{text-align:center;padding:34px 14px;border-right:1px solid var(--line)}
.principle:last-child{border-right:none}
.principle .k{font-family:var(--serif);font-weight:600;font-size:26px;color:var(--red);letter-spacing:4px}
.principle .d{font-size:12.5px;color:var(--muted);margin-top:8px;font-weight:300}
.belief .midlab{text-align:center;margin:80px 0 50px}
.belief .midlab .lab{justify-content:center;margin-bottom:0}
.belief .midlab h3{font-family:var(--serif);font-weight:600;font-size:clamp(22px,2.8vw,30px);color:var(--ink);letter-spacing:3px;margin-top:14px}
.core-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-top:1px solid var(--line);background:var(--paper)}
.core-card{padding:44px 24px 40px;text-align:center;position:relative;transition:.4s;border-right:1px solid var(--line)}
.core-card:last-child{border-right:none}
.core-card::before{content:"";position:absolute;left:0;top:-1px;width:100%;height:2px;background:var(--red);transform:scaleX(0);transition:transform .4s}
.core-card:hover{background:var(--cream)}
.core-card:hover::before{transform:scaleX(1)}
.core-card .no{font-family:var(--serif);font-weight:400;font-size:14px;color:var(--red);letter-spacing:2px}
.core-card h4{font-family:var(--serif);font-weight:600;font-size:18px;color:var(--ink);margin:16px 0 14px;letter-spacing:1.5px;line-height:1.5}
.core-card p{font-size:13px;color:#6e615b;line-height:1.9;font-weight:300}

/* ====== 5. 未來願景 ====== */
.vision{position:relative;padding:150px 0;text-align:center;color:#fff;overflow:hidden;background:linear-gradient(120deg,var(--red-deep),var(--red))}
.vision .orbit-deco{position:absolute;left:-80px;bottom:-80px;width:320px;height:320px;opacity:.25}
.vision .orbit-deco svg{width:100%;height:100%}
.vision .orbit-deco .o{fill:none;stroke:#fff;stroke-width:1}.vision .orbit-deco .c{fill:#fff}
.vision .inner{position:relative;z-index:2;max-width:640px;margin:0 auto}
.vision .lab{justify-content:center}
.vision .lab .en{color:rgba(255,225,218,.9)}.vision .lab .ln{background:rgba(255,225,218,.7)}
.vision h2{font-family:var(--serif);font-weight:600;font-size:clamp(30px,4.4vw,46px);letter-spacing:6px;margin:6px 0 26px;line-height:1.5}
.vision p{color:rgba(255,255,255,.85);font-size:16.5px;line-height:2.2;margin-bottom:42px;font-weight:300}
.vision .photo-note{font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.45);border:1px dashed rgba(255,255,255,.3);padding:14px;max-width:380px;margin:0 auto 42px}
.vision a{display:inline-block;border:1px solid rgba(255,255,255,.8);color:#fff;text-decoration:none;padding:15px 44px;font-weight:400;letter-spacing:3px;transition:.3s}
.vision a:hover{background:#fff;color:var(--red)}

/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.55);padding:50px 0;font-size:13px;text-align:center;letter-spacing:1.5px;font-weight:300}
footer b{font-family:var(--serif);color:#fff;font-size:17px;letter-spacing:3px;font-weight:600}
footer .red{color:rgba(255,225,218,.8)}

/* reveal */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .9s ease,transform .9s ease}
.reveal.in{opacity:1;transform:none}

/* RESPONSIVE */
@media(max-width:960px){
  .menu,.nav-cta{display:none}
  .burger{display:block;font-size:24px;background:none;border:none;color:var(--red);cursor:pointer}
  .subnav{display:none}
  .hero .orbit-deco{opacity:.25;right:-140px}
  .origin-grid,.founder-grid{grid-template-columns:1fr;gap:64px}
  .origin-fig .ph{aspect-ratio:4/3}
  .founder-fig{order:-1}.founder-fig .ph{aspect-ratio:16/10}
  .statstrip .row{grid-template-columns:1fr 1fr}
  .stat:nth-child(3)::before{display:none}
  .principles{grid-template-columns:1fr 1fr}
  .principle:nth-child(2){border-right:none}
  .core-grid{grid-template-columns:1fr 1fr;border-top:none}
  .core-card{border:1px solid var(--line);margin:-0.5px}
  .timeline .head{align-items:flex-start;flex-direction:column}
  .tl-card{flex:0 0 80%}
}
@media(max-width:520px){
  .wrap{padding:0 24px}
  .statstrip .row,.principles,.core-grid{grid-template-columns:1fr}
  .stat::before,.stat:nth-child(n)::before{display:none!important}
  .principle{border-right:none;border-bottom:1px solid var(--line)}
}
</style>
</head>
